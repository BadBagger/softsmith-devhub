# SoftSmith Android app registry.
# Keep secrets out of this file. Use HTTPS or SSH clone URLs that rely on your
# local GitHub authentication, deploy keys, or future CI secrets.

apps:
  - id: workday-planner
    name: Workday Planner
    repoUrl: https://github.com/BadBagger/workday-planner.git
    localFolder: repos/workday-planner
    packageName: com.example.workdayplanner
    appType: android-compose
    playStoreTrack: internal
    notes: GitHub repo and APK release connected. Latest known release is v2.36-style-packs. DevHub icon refreshed from SmithWare app artwork in v1.0.20-smithware-icons.

  - id: renewal-radar
    name: Renewal Radar
    repoUrl: https://github.com/BadBagger/renewal-radar.git
    localFolder: repos/renewal-radar
    packageName: com.renewalradar.app
    appType: android-compose
    playStoreTrack: internal
    notes: Local-first renewal tracking app. GitHub repo and APK release connected. Latest known release is v1.7.1-plaid-beta-trial, which adds per-install backend user IDs, low-number Plaid beta caps/allowlists, beta status on /health, and Plaid beta requirements docs. v1.7.0 adds local Demo Mode, CSV Import, hosted-backend-ready Plaid scaffold, and removes temporary desktop backend defaults. v1.6.6 makes Connect bank/card fall back to fully local demo candidates when the Plaid backend is unavailable. v1.6 adds Plaid Link bank/card connection architecture, backend-only Plaid sync scaffold, detected-renewal review, recurring charge detection, prediction windows, reminder timing, and watch-outs. DevHub icon refreshed from SmithWare app artwork in v1.0.20-smithware-icons.

  - id: fridge-finish
    name: Fridge Finish
    repoUrl: https://github.com/BadBagger/fridge-finish.git
    localFolder: repos/fridge-finish
    packageName: com.fridgefinish.app
    appType: android-compose
    playStoreTrack: internal
    notes: GitHub repo and APK release connected. Latest known release is v1.27-style-packs with premium theme style packs, Original Fresh as the free default, appearance mode persistence, live previews, and semantic food-state colors. DevHub icon refreshed from SmithWare app artwork in v1.0.20-smithware-icons; embedded Android launcher icon refreshed in v1.24.

  - id: paycheck-pilot
