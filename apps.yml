    appType: android-compose
    playStoreTrack: internal
    notes: Local-first paycheck and bills planning app. GitHub repo and v1.0.8-premium-bank-sync-plan APK release connected with outside-Play release signing, offline demo financial scenarios, and a mock Premium gate for bank/card sync while manual planning stays free. DevHub icon refreshed from SmithWare app artwork in v1.0.20-smithware-icons.

