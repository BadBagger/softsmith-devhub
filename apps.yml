    localFolder: repos/renewal-radar
    packageName: com.renewalradar.app
    appType: android-compose
    playStoreTrack: internal
    notes: Local-first renewal tracking app. GitHub repo and APK release connected. Latest known release is v1.7.2-plaid-beta-setup, which shows the per-install beta ID in debug Settings and adds copy/paste Plaid Trial application wording. v1.7.1 adds per-install backend user IDs, low-number Plaid beta caps/allowlists, beta status on /health, and Plaid beta requirements docs. v1.7.0 adds local Demo Mode, CSV Import, hosted-backend-ready Plaid scaffold, and removes temporary desktop backend defaults. v1.6.6 makes Connect bank/card fall back to fully local demo candidates when the Plaid backend is unavailable. v1.6 adds Plaid Link bank/card connection architecture, backend-only Plaid sync scaffold, detected-renewal review, recurring charge detection, prediction windows, reminder timing, and watch-outs. DevHub icon refreshed from SmithWare app artwork in v1.0.20-smithware-icons.

