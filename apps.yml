# SoftSmith Android app registry.
# Keep secrets out of this file. Use HTTPS or SSH clone URLs that rely on your
# local GitHub authentication, deploy keys, or future CI secrets.

apps:
  - id: workday-planner
    name: Workday Planner
    repoUrl: https://github.com/BadBagger/workday-planner.git
    localFolder: repos/workday-planner
    packageName: com.example.workdayplanner
    appType: android-compose
    playStoreTrack: internal
    notes: GitHub repo and APK release connected. Latest known release is v2.46-voice-parser-hotfix. v2.45 added fairer Premium gates, 6 free schedule screenshot imports per month, free built-in routines, free basic repeats/skip-days-off, safer import preview wording, clearer alarm confirmation copy, and Premium navigation fixes. DevHub reads live GitHub latest releases first.

